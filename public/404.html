<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>New Horizon Villas</title>
  <script>
    // Single Page Apps for GitHub Pages — spa-github-pages pattern
    // Encodes the path and redirects to index.html where React Router takes over.
    // pathSegmentsToKeep = 1 preserves the /New-Horizon/ repo prefix.
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
